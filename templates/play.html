<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ heading }}</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    color: #e8e8f0;
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    background: #111118;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    padding: 40px 36px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .icon { font-size: 48px; margin-bottom: 20px; }
  .status {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 3px;
    font-family: 'Space Mono', monospace;
    margin-bottom: 16px;
    color: {{ status_color }};
  }
  h1 {
    font-size: 22px; font-weight: 800;
    line-height: 1.2; margin-bottom: 10px;
  }
  .subtitle {
    font-size: 13px; color: #666680;
    font-family: 'Space Mono', monospace;
    line-height: 1.6;
    margin-bottom: 28px;
  }
  .device-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(124,106,247,0.1);
    border: 1px solid rgba(124,106,247,0.25);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px; font-weight: 600;
    color: #a090ff;
    margin-bottom: 28px;
  }
  .error-box {
    background: rgba(240,74,106,0.1);
    border: 1px solid rgba(240,74,106,0.3);
    border-radius: 8px;
    padding: 14px;
    font-size: 13px; color: #f04a6a;
    font-family: 'Space Mono', monospace;
    line-height: 1.5;
    margin-bottom: 24px;
    text-align: left;
  }
  .resume-info {
    font-size: 12px; color: #666680;
    font-family: 'Space Mono', monospace;
  }
  .resume-info span { color: #4af0a0; }
  a {
    color: #7c6af7; text-decoration: none;
    font-size: 13px;
    display: block; margin-top: 24px;
    font-family: 'Space Mono', monospace;
  }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">{{ icon }}</div>
  <div class="status">{{ status_label }}</div>
  <h1>{{ heading }}</h1>
  <div class="subtitle">{{ subtitle }}</div>
  {{ extra_html | safe }}
  <a href="/">← Open dashboard</a>
</div>
</body>
</html>
